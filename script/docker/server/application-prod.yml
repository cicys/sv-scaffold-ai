--- # Docker Compose 部署覆盖配置
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:mysql://mysql:3306/infoq?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true
          username: root
          password: root

spring.data:
  redis:
    host: redis
    port: 6379
    password: '123456'

infoq:
  quartz:
    bootstrap:
      # Compose 启动时由 DEPLOY_ID 注入；同一批多节点必须保持相同值。
      deploy-id: ${DEPLOY_ID:}

--- # 临时文件存储目录
spring.servlet.multipart.location: /infoq/server/temp
